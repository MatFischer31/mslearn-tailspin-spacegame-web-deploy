trigger:
- '*'

variables:
  buildConfiguration: 'Release'
  releaseBranchName: 'release'

stages:

# =========================================================
# BUILD — MICROSOFT-HOSTED UBUNTU AGENT
# =========================================================
- stage: Build
  displayName: 'Build the web application'

  jobs:
  - job: Build
    displayName: 'Build job'

    pool:
      name: 'Azure Pipelines'
      vmImage: 'ubuntu-22.04'
      demands:
      - npm

    variables:
      wwwrootDir: 'Tailspin.SpaceGame.Web/wwwroot'
      dotnetSdkVersion: '8.x'

    steps:
    - checkout: self
      clean: true

    - script: |
        echo "Requested pool: Azure Pipelines"
        echo "Requested image: ubuntu-22.04"
        echo "Agent name: $(Agent.Name)"
        echo "Machine name: $(Agent.MachineName)"
        echo "Agent operating system: $(Agent.OS)"
        echo "Agent architecture: $(Agent.OSArchitecture)"

        echo ""
        echo "Linux kernel information:"
        uname -a

        echo ""
        echo "Operating system information:"
        cat /etc/os-release
      displayName: 'Verify Microsoft-hosted agent'

    - task: UseDotNet@2
      displayName: 'Use .NET SDK $(dotnetSdkVersion)'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetSdkVersion)'

    - task: NodeTool@0
      displayName: 'Install Node.js 16'
      inputs:
        versionSpec: '16.20.2'

    - script: |
        node --version
        npm --version
      displayName: 'Verify Node.js version'

    - task: Npm@1
      displayName: 'Run npm install'
      inputs:
        command: 'install'
        verbose: false

    - script: |
        ./node_modules/.bin/node-sass \
          "$(wwwrootDir)" \
          --output "$(wwwrootDir)"
      displayName: 'Compile Sass assets'

    - task: gulp@1
      displayName: 'Run gulp tasks'

    - script: |
        echo "$(Build.DefinitionName), $(Build.BuildId), $(Build.BuildNumber)" \
          > buildinfo.txt
      workingDirectory: '$(wwwrootDir)'
      displayName: 'Write build info'

    - task: DotNetCoreCLI@2
      displayName: 'Restore project dependencies'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build the project - $(buildConfiguration)'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: >
          --no-restore
          --configuration $(buildConfiguration)

    - task: DotNetCoreCLI@2
      displayName: 'Publish the project - $(buildConfiguration)'
      inputs:
        command: 'publish'
        projects: '**/*.csproj'
        publishWebProjects: false
        arguments: >
          --no-build
          --configuration $(buildConfiguration)
          --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)
        zipAfterPublish: true

    - publish: '$(Build.ArtifactStagingDirectory)'
      artifact: drop
      displayName: 'Publish build artifact'


# =========================================================
# DEV — MICROSOFT-HOSTED UBUNTU AGENT
# =========================================================
- stage: Dev
  displayName: 'Deploy to the dev environment'
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: Deploy
    displayName: 'Deploy to Dev'

    pool:
      name: 'Azure Pipelines'
      vmImage: 'ubuntu-22.04'

    environment: dev

    variables:
    - group: Release

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: 'Download build artifact'

          - task: AzureWebApp@1
            displayName: 'Azure App Service Deploy: dev website'
            inputs:
              azureSubscription: 'SecureApp-Azure'
              appType: 'webAppLinux'
              appName: '$(WebAppNameDev)'
              package: >
                $(Pipeline.Workspace)/drop/$(buildConfiguration)/*.zip


# =========================================================
# STAGING — MICROSOFT-HOSTED UBUNTU AGENT
# =========================================================
- stage: Staging
  displayName: 'Deploy to the staging environment'
  dependsOn: Dev
  condition: succeeded()

  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy to Staging'

    pool:
      name: 'Azure Pipelines'
      vmImage: 'ubuntu-22.04'

    environment: staging

    variables:
    - group: Release

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: 'Download build artifact'

          - task: AzureWebApp@1
            displayName: 'Azure App Service Deploy: staging website'
            inputs:
              azureSubscription: 'SecureApp-Azure'
              appType: 'webAppLinux'
              appName: '$(WebAppNameStaging)'
              package: >
                $(Pipeline.Workspace)/drop/$(buildConfiguration)/*.zip