trigger: none

pool:
  name: PRO690

steps:
- powershell: |
    Write-Host "Agent Name: $(Agent.Name)"
    Write-Host "Machine Name: $(Agent.MachineName)"
    Write-Host "Operating System: $(Agent.OS)"

    git --version
    dotnet --version
    node --version
    npm.cmd --version

    Write-Host "All required tools verified successfully."
  displayName: Verify self-hosted agent tools